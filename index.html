<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مختبر المثلثات المطور</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --panel: #ffffff;
            --text-dark: #1e293b;
        }
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: row;
            height: 100vh;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { 
                width: 100% !important; 
                height: 45% !important; 
                order: 2; 
                overflow-y: auto;
                border-top: 2px solid #ddd;
            }
            .main-content { height: 55% !important; order: 1; }
        }

        .sidebar {
            width: 320px;
            background: var(--panel);
            padding: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .main-content {
            flex-grow: 1;
            position: relative;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        .control-item {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #475569;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            background: #1e293b;
            color: #38bdf8;
            padding: 12px;
            border-radius: 6px;
        }

        .btn-reset {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-reset:hover { background: #1d4ed8; }
        input[type="checkbox"] { cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="margin-top: 0; color: var(--text-dark);">التحكم بالمثلث</h2>
    
    <div class="control-item">
        <label>سماكة الخط ولونه</label>
        <div style="display: flex; gap: 10px; align-items: center;">
            <input type="range" id="lineWidth" min="1" max="10" value="3" style="flex: 1;">
            <input type="color" id="lineColor" value="#2563eb" style="width: 40px; height: 30px; border: none; cursor: pointer;">
        </div>
    </div>

    <div class="control-item">
        <label>إعدادات العرض</label>
        <label style="font-weight: normal;"><input type="checkbox" id="showLabels" checked> إظهار القيم (زوايا وأضلاع)</label>
        <label style="font-weight: normal;"><input type="checkbox" id="showGrid" checked> إظهار الشبكة</label>
    </div>

    <div class="control-item">
        <label>البيانات الحقيقية</label>
        <div id="stats" class="stats-grid"></div>
    </div>

    <button class="btn-reset" onclick="resetPoints()">إعادة تعيين الشكل</button>
</div>

<div class="main-content" id="canvasContainer">
    <canvas id="triCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('triCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('canvasContainer');
    const statsDiv = document.getElementById('stats');

    const config = {
        lineWidth: document.getElementById('lineWidth'),
        lineColor: document.getElementById('lineColor'),
        showLabels: document.getElementById('showLabels'),
        showGrid: document.getElementById('showGrid')
    };

    let points = [];
    let dragIdx = -1;

    function resize() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = container.clientWidth * dpr;
        canvas.height = container.clientHeight * dpr;
        ctx.scale(dpr, dpr);
        canvas.style.width = container.clientWidth + 'px';
        canvas.style.height = container.clientHeight + 'px';
        
        if (points.length === 0) resetPoints();
        draw();
    }

    function resetPoints() {
        const w = container.clientWidth;
        const h = container.clientHeight;
        points = [
            { x: w * 0.5, y: h * 0.2, color: '#ef4444', label: 'α' },
            { x: w * 0.25, y: h * 0.7, color: '#10b981', label: 'β' },
            { x: w * 0.75, y: h * 0.7, color: '#3b82f6', label: 'γ' }
        ];
        draw();
    }

    function getDist(p1, p2) { return Math.hypot(p1.x - p2.x, p1.y - p2.y); }

    function draw() {
        const w = container.clientWidth;
        const h = container.clientHeight;
        ctx.clearRect(0, 0, w, h);
        
        // 1. رسم الشبكة (تم الإصلاح هنا)
        if (config.showGrid.checked) {
            ctx.beginPath();
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 0.5;
            for(let i=0; i <= w; i+=40) { ctx.moveTo(i,0); ctx.lineTo(i,h); }
            for(let i=0; i <= h; i+=40) { ctx.moveTo(0,i); ctx.lineTo(w,i); }
            ctx.stroke();
        }

        const [p1, p2, p3] = points;
        const a = getDist(p2, p3);
        const b = getDist(p1, p3);
        const c = getDist(p1, p2);

        // حساب الزوايا
        const A = Math.acos(Math.max(-1, Math.min(1, (b*b + c*c - a*a)/(2*b*c)))) * 180 / Math.PI || 0;
        const B = Math.acos(Math.max(-1, Math.min(1, (a*a + c*c - b*b)/(2*a*c)))) * 180 / Math.PI || 0;
        const C = Math.max(0, 180 - A - B);

        // 2. رسم أضلاع المثلث
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.lineTo(p3.x, p3.y);
        ctx.closePath();
        ctx.strokeStyle = config.lineColor.value;
        ctx.lineWidth = config.lineWidth.value;
        ctx.lineJoin = 'round';
        ctx.stroke();

        // 3. رسم أطوال الأضلاع
        if (config.showLabels.checked) {
            ctx.font = "bold 13px sans-serif";
            ctx.fillStyle = "#64748b";
            ctx.textAlign = "center";
            
            // نصوص الأضلاع
            ctx.fillText(`a: ${(a/50).toFixed(1)}`, (p2.x + p3.x)/2, (p2.y + p3.y)/2 + 20);
            ctx.fillText(`b: ${(b/50).toFixed(1)}`, (p1.x + p3.x)/2 + 25, (p1.y + p3.y)/2);
            ctx.fillText(`c: ${(c/50).toFixed(1)}`, (p1.x + p2.x)/2 - 25, (p1.y + p2.y)/2);
        }

        // 4. رسم الرؤوس والزوايا
        const angles = [A, B, C];
        points.forEach((p, i) => {
            // تأثير الظل للرؤوس
            ctx.shadowBlur = 5;
            ctx.shadowColor = 'rgba(0,0,0,0.2)';
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, dragIdx === i ? 15 : 10, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;

            if (config.showLabels.checked) {
                ctx.fillStyle = "#1e293b";
                ctx.font = "bold 14px sans-serif";
                ctx.fillText(`${p.label}: ${angles[i].toFixed(1)}°`, p.x, p.y - 20);
            }
        });

        // تحديث الجدول
        statsDiv.innerHTML = `
            <div>α: ${A.toFixed(1)}°</div> <div>a: ${(a/50).toFixed(1)}</div>
            <div>β: ${B.toFixed(1)}°</div> <div>b: ${(b/50).toFixed(1)}</div>
            <div>γ: ${C.toFixed(1)}°</div> <div>c: ${(c/50).toFixed(1)}</div>
        `;
    }

    // إدارة الأحداث
    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: clientX - rect.left,
            y: clientY - rect.top
        };
    }

    function handleStart(e) {
        const pos = getMousePos(e);
        points.forEach((p, i) => {
            if (getDist(pos, p) < 30) dragIdx = i;
        });
        draw();
    }

    function handleMove(e) {
        if (dragIdx < 0) return;
        if (e.cancelable) e.preventDefault();
        const pos = getMousePos(e);
        points[dragIdx].x = pos.x;
        points[dragIdx].y = pos.y;
        draw();
    }

    function handleEnd() {
        dragIdx = -1;
        draw();
    }

    canvas.addEventListener('mousedown', handleStart);
    canvas.addEventListener('touchstart', handleStart, {passive: false});
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', handleMove, {passive: false});
    window.addEventListener('mouseup', handleEnd);
    window.addEventListener('touchend', handleEnd);

    // ربط المدخلات بالرسم
    [config.lineWidth, config.lineColor, config.showLabels, config.showGrid].forEach(el => {
        el.addEventListener('input', draw);
    });

    window.addEventListener('resize', resize);
    resize();
</script>
</body>
</html>
